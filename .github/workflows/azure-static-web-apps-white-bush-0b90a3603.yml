name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main  # Only deploy after merge to main
    paths:
      - 'childsmile/frontend/**'
      - '.github/workflows/azure-static-web-apps-white-bush-0b90a3603.yml'
  # Removed pull_request trigger - we only want to deploy AFTER merge, not on PR open/sync

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string
      - name: Send WhatsApp - Deployment Started
        continue-on-error: true
        run: |
          python3 << 'EOF'
          import requests
          import json
          
          account_sid = "${{ secrets.TWILIO_ACCOUNT_SID }}"
          auth_token = "${{ secrets.TWILIO_AUTH_TOKEN }}"
          twilio_from = "${{ secrets.TWILIO_WHATSAPP_FROM }}"
          content_sid = "${{ secrets.TWILIO_CONTENT_SID }}"
          
          raw_recipients = "${{ secrets.TWILIO_RECIPIENTS_TEST }}".split(',')
          
          url = f"https://api.twilio.com/2010-04-01/Accounts/{account_sid}/Messages.json"
          
          vars_json = json.dumps({
              "1": "ממשק",
              "2": "התחיל"
          })
          
          for r in raw_recipients:
              # Clean: keep only alphanumeric and special chars needed for Twilio (: and +)
              clean_to = "".join(c for c in r if c.isalnum() or c in [':', '+'] or ord(c) > 127).strip()
              # Remove any BiDi control characters
              bidi_chars = [8206, 8207, 8234, 8235, 8236, 8237, 8238, 8239, 8294, 8295, 8296, 8297]
              clean_to = "".join(c for c in clean_to if ord(c) not in bidi_chars)
              
              if not clean_to:
                  continue
              
              payload = {
                  "From": twilio_from,
                  "To": clean_to,
                  "ContentSid": content_sid,
                  "ContentVariables": vars_json
              }
              
              response = requests.post(url, data=payload, auth=(account_sid, auth_token))
              if response.status_code == 201:
                  print(f"✅ Message sent to {clean_to}")
              else:
                  print(f"❌ Failed for {clean_to}: {response.status_code} - {response.text}")
          EOF
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_BUSH_0B90A3603 }}
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./childsmile/frontend" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "dist" # Built app content directory - optional
          github_id_token: ${{ steps.idtoken.outputs.result }}
          ###### End of Repository/Build Configurations ######
      - name: Send WhatsApp - Deployment Successful
        if: success()
        continue-on-error: true
        run: |
          python3 << 'EOF'
          import requests
          import json
          
          account_sid = "${{ secrets.TWILIO_ACCOUNT_SID }}"
          auth_token = "${{ secrets.TWILIO_AUTH_TOKEN }}"
          twilio_from = "${{ secrets.TWILIO_WHATSAPP_FROM }}"
          content_sid = "${{ secrets.TWILIO_CONTENT_SID }}"
          
          raw_recipients = "${{ secrets.TWILIO_RECIPIENTS_TEST }}".split(',')
          
          url = f"https://api.twilio.com/2010-04-01/Accounts/{account_sid}/Messages.json"
          
          vars_json = json.dumps({
              "1": "ממשק",
              "2": "הצליח"
          })
          
          for r in raw_recipients:
              # Clean: keep only alphanumeric and special chars needed for Twilio (: and +)
              clean_to = "".join(c for c in r if c.isalnum() or c in [':', '+'] or ord(c) > 127).strip()
              # Remove any BiDi control characters
              bidi_chars = [8206, 8207, 8234, 8235, 8236, 8237, 8238, 8239, 8294, 8295, 8296, 8297]
              clean_to = "".join(c for c in clean_to if ord(c) not in bidi_chars)
              
              if not clean_to:
                  continue
              
              payload = {
                  "From": twilio_from,
                  "To": clean_to,
                  "ContentSid": content_sid,
                  "ContentVariables": vars_json
              }
              
              response = requests.post(url, data=payload, auth=(account_sid, auth_token))
              if response.status_code == 201:
                  print(f"✅ Message sent to {clean_to}")
              else:
                  print(f"❌ Failed for {clean_to}: {response.status_code} - {response.text}")
          EOF
      - name: Send WhatsApp - Deployment Failed
        if: failure()
        continue-on-error: true
        run: |
          python3 << 'EOF'
          import requests
          import json
          
          account_sid = "${{ secrets.TWILIO_ACCOUNT_SID }}"
          auth_token = "${{ secrets.TWILIO_AUTH_TOKEN }}"
          twilio_from = "${{ secrets.TWILIO_WHATSAPP_FROM }}"
          content_sid = "${{ secrets.TWILIO_CONTENT_SID }}"
          
          raw_recipients = "${{ secrets.TWILIO_RECIPIENTS_TEST }}".split(',')
          
          url = f"https://api.twilio.com/2010-04-01/Accounts/{account_sid}/Messages.json"
          
          vars_json = json.dumps({
              "1": "ממשק",
              "2": "נכשל"
          })
          
          for r in raw_recipients:
              # Clean: keep only alphanumeric and special chars needed for Twilio (: and +)
              clean_to = "".join(c for c in r if c.isalnum() or c in [':', '+'] or ord(c) > 127).strip()
              # Remove any BiDi control characters
              bidi_chars = [8206, 8207, 8234, 8235, 8236, 8237, 8238, 8239, 8294, 8295, 8296, 8297]
              clean_to = "".join(c for c in clean_to if ord(c) not in bidi_chars)
              
              if not clean_to:
                  continue
              
              payload = {
                  "From": twilio_from,
                  "To": clean_to,
                  "ContentSid": content_sid,
                  "ContentVariables": vars_json
              }
              
              response = requests.post(url, data=payload, auth=(account_sid, auth_token))
              if response.status_code == 201:
                  print(f"✅ Message sent to {clean_to}")
              else:
                  print(f"❌ Failed for {clean_to}: {response.status_code} - {response.text}")
          EOF
