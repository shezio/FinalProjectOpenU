<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8bbd0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Family figures -->
  <g opacity="0.18">
    <!-- Father -->
    <circle cx="250" cy="180" r="35" fill="#d4a574"/>
    <rect x="220" y="220" width="60" height="100" fill="#2c3e50" rx="8"/>
    <rect x="180" y="235" width="40" height="80" fill="#d4a574" rx="8"/>
    <rect x="260" y="235" width="40" height="80" fill="#d4a574" rx="8"/>
    <rect x="210" y="320" width="25" height="80" fill="#34495e" rx="8"/>
    <rect x="235" y="320" width="25" height="80" fill="#34495e" rx="8"/>
    
    <!-- Mother -->
    <circle cx="600" cy="190" r="35" fill="#d4a574"/>
    <rect x="575" y="230" width="50" height="110" fill="#e74c3c" rx="8"/>
    <rect x="545" y="245" width="30" height="85" fill="#d4a574" rx="8"/>
    <rect x="595" y="245" width="30" height="85" fill="#d4a574" rx="8"/>
    <rect x="580" y="340" width="20" height="85" fill="#3498db" rx="8"/>
    <rect x="600" y="340" width="20" height="85" fill="#3498db" rx="8"/>
    
    <!-- Child 1 -->
    <circle cx="420" cy="240" r="28" fill="#d4a574"/>
    <rect x="400" y="270" width="40" height="80" fill="#f39c12" rx="7"/>
    <rect x="380" y="280" width="20" height="70" fill="#d4a574" rx="7"/>
    <rect x="420" y="280" width="20" height="70" fill="#d4a574" rx="7"/>
    <rect x="405" y="350" width="15" height="70" fill="#3498db" rx="7"/>
    <rect x="420" y="350" width="15" height="70" fill="#3498db" rx="7"/>
    
    <!-- Child 2 -->
    <circle cx="750" cy="250" r="25" fill="#d4a574"/>
    <rect x="732" y="275" width="36" height="75" fill="#9b59b6" rx="7"/>
    <rect x="715" y="285" width="17" height="65" fill="#d4a574" rx="7"/>
    <rect x="748" y="285" width="17" height="65" fill="#d4a574" rx="7"/>
    <rect x="738" y="350" width="13" height="65" fill="#3498db" rx="7"/>
    <rect x="751" y="350" width="13" height="65" fill="#3498db" rx="7"/>
    
    <!-- Heart above -->
    <g transform="translate(500, 100)">
      <path d="M 0,-10 C -15,-25 -30,-15 -30,0 C -30,15 0,40 0,40 C 0,40 30,15 30,0 C 30,-15 15,-25 0,-10 Z" fill="#e74c3c" opacity="0.6"/>
    </g>
  </g>
  
  <!-- House outline -->
  <g opacity="0.12">
    <rect x="900" y="350" width="220" height="200" fill="none" stroke="#c0392b" stroke-width="6"/>
    <!-- Roof -->
    <polygon points="900,350 1010,250 1120,350" fill="none" stroke="#c0392b" stroke-width="6"/>
    <!-- Door -->
    <rect x="970" y="450" width="80" height="100" fill="none" stroke="#c0392b" stroke-width="4"/>
    <!-- Windows -->
    <rect x="920" y="380" width="50" height="50" fill="none" stroke="#c0392b" stroke-width="3"/>
    <line x1="945" y1="380" x2="945" y2="430" stroke="#c0392b" stroke-width="2"/>
    <line x1="920" y1="405" x2="970" y2="405" stroke="#c0392b" stroke-width="2"/>
    
    <rect x="1050" y="380" width="50" height="50" fill="none" stroke="#c0392b" stroke-width="3"/>
    <line x1="1075" y1="380" x2="1075" y2="430" stroke="#c0392b" stroke-width="2"/>
    <line x1="1050" y1="405" x2="1100" y2="405" stroke="#c0392b" stroke-width="2"/>
  </g>
  
  <!-- Decorative circles (balloons/bubbles) -->
  <g opacity="0.1">
    <circle cx="150" cy="500" r="40" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    <circle cx="1100" cy="150" r="35" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <circle cx="400" cy="650" r="45" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  </g>
</svg>
